name: ERP DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: docker build -t erp-backend -f docker/backend.Dockerfile .

      - name: Run Container Test
        run: docker run -d -p 5000:5000 erp-backend